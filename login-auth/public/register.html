<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #16213e;
      padding: 40px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    h2 { color: #00d084; text-align: center; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0f3460;
      color: white;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #00d084;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #00b371; }
    p { color: #aaa; text-align: center; margin-top: 16px; }
    a { color: #00d084; text-decoration: none; }
    #msg { text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📝 Register</h2>
    <input type="text" id="username" placeholder="Choose a Username" />
    <input type="password" id="password" placeholder="Choose a Password" />
    <button onclick="register()">Register</button>
    <p>Already have an account? <a href="/">Login</a></p>
    <p id="msg"></p>
  </div>

  <script>
    async function register() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      const msg = document.getElementById('msg');
      if (res.ok) {
        msg.style.color = '#00d084';
        msg.textContent = '✅ Registered! Redirecting...';
        setTimeout(() => window.location.href = '/', 1500);
      } else {
        msg.style.color = '#ff6b6b';
        msg.textContent = data.message;
      }
    }
  </script>
</body>
</html>
